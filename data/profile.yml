# Biography paragraphs. Each "- " item is one paragraph. HTML links allowed.
bio_html:
  - >-
    Hey there! I am a sixth-year PhD student at
    <a href="https://www.comp.nus.edu.sg/">National University of Singapore</a>,
    co-supervised by <a href="https://www.comp.nus.edu.sg/~peh/">Prof. Li-Shiuan Peh</a>
    and <a href="https://www.comp.nus.edu.sg/~tulika/">Prof. Tulika Mitra</a>.
    During my PhD, I have had the opportunity to intern at
    <a href="https://research.ibm.com/labs/yorktown-heights">IBM Research, Yorktown Heights</a>,
    <a href="https://www.amd.com/en.html">AMD Research</a> and
    <a href="https://www.renesas.com/us/en">Renesas</a>.
  - >-
    Prior to this, I completed my undergraduate degree in Electronics and Communication
    Engineering at <a href="https://www.iiitd.ac.in/">IIIT Delhi</a>, where I worked in the
    <a href="https://www.iiitd.edu.in/noc/">AMS Lab</a>. I also spent time at
    <a href="https://www.ntu.edu.sg/hesl">HESL Lab</a> at
    <a href="https://www.ntu.edu.sg/scse">Nanyang Technological University, Singapore</a>.
    After graduation, I worked for two years at
    <a href="https://www.qualcomm.com/">Qualcomm India</a> as a CPU RTL Design Engineer.
  - >-
    My research lies at the intersection of VLSI design, computer architecture, and AI,
    developing hardware-software co-design solutions for performance and efficiency bottlenecks
    in the post Dennard era. I focus on reconfigurable architectures and GPU-based accelerators
    for irregular and mixed-precision workloads driven by sparsity and quantization, supported by
    LLVM-based compiler toolchains. Validated through real-world chip tapeouts, my work advances
    performance, energy efficiency, and reliability while reducing the carbon footprint of modern computing.
  - >-
    In the past, I have been fortunate to collaborate with
    <a href="https://users.elis.ugent.be/~leeckhou/">Prof. Lieven Eeckhout</a> [Ghent University],
    <a href="https://www.comp.nus.edu.sg/~wongwf/">Prof. Weng-Fai Wong</a> [NUS],
    <a href="https://www.comp.nus.edu.sg/~tcarlson/">Prof. Trevor Carlson</a> [NUS],
    <a href="https://www.iiitd.edu.in/~sdeb/">Prof. Sujay Deb</a> [IIIT-Delhi],
    <a href="https://siewkeilam.github.io/ei-research-group/index.html">Prof. Lam Siew Kei</a> [NTU], and
    <a href="https://www.linkedin.com/in/saru-vig/?originalSubdomain=sg">Saru Vig</a> [Google].

