# =============================================================================
# PUBLICATIONS SECTION
# Organized into sections (Conferences, Journals, Chip Tapeouts). To add a paper,
# copy an entry block under the right section and edit the fields.
#
# Each section:
#   heading : the sub-heading shown above the list (e.g. "Conferences")
#   entries : the list of papers
#
# Each entry:
#   badge       : short venue tag shown on the left (e.g. "ICCAD"). Use "" for none.
#   title       : paper title
#   authors_html: author list. Wrap your own name like:
#                 <u><strong>Rohan Juneja</strong></u>
#   venue_html  : optional italic venue line. Omit the field to hide it.
#   links       : optional list of buttons, each "- {label: ABS, url: ...}".
#                 Use url "#" for a placeholder button. Omit to show no buttons.
# After editing, just commit & push — the website updates automatically.
# =============================================================================

